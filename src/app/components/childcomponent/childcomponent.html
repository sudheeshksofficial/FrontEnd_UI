<div class="container mt-5">
  <div class="row">
    <!-- Child Component Section -->
    <div class="col-md-6 mb-4">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h4 class="card-title text-primary">Child Component</h4>
          <p class="card-text">Child component works!</p>
          <p class="card-text"><strong>Data received from parent:</strong> {{ parentvalue }}</p>
          <button class="btn btn-success mt-2" (click)="submitHandler()">Send Data to Parent</button>
        </div>
      </div>
    </div>
  </div>
</div>
